<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Foreman</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: var(--bg); color: var(--text); font-size: 14px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header .status { font-size: 12px; color: var(--muted); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; }
  .card h2 { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .stat-row { display: flex; justify-content: space-between; padding: 4px 0; }
  .stat-label { color: var(--muted); }
  .stat-value { font-weight: 600; font-variant-numeric: tabular-nums; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
  .badge-green { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-red { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-blue { background: rgba(88,166,255,0.15); color: var(--accent); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--muted); font-size: 12px; text-transform: uppercase; padding: 8px 4px; border-bottom: 1px solid var(--border); }
  td { padding: 8px 4px; border-bottom: 1px solid var(--border); font-size: 13px; }
  tr:hover { background: rgba(88,166,255,0.04); }
  .session-output { font-family: monospace; font-size: 11px; color: var(--muted); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .full-width { grid-column: 1 / -1; }
  .confidence-bar { display: inline-block; width: 60px; height: 6px; background: var(--border); border-radius: 3px; margin-right: 6px; vertical-align: middle; }
  .confidence-fill { height: 100%; border-radius: 3px; }
  .empty { color: var(--muted); font-style: italic; padding: 12px 0; }
  #live-indicator { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Foreman</h1>
    <div class="status"><span id="live-indicator"></span><span id="uptime"></span></div>
  </header>

  <div class="grid">
    <div class="card">
      <h2>Stats</h2>
      <div id="stats"><div class="empty">Loading...</div></div>
    </div>
    <div class="card">
      <h2>Active Goals</h2>
      <div id="goals"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <div class="grid">
    <div class="card full-width">
      <h2>Active Sessions</h2>
      <div id="sessions"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <div class="grid">
    <div class="card full-width">
      <h2>Recent Decisions</h2>
      <div id="decisions"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Confidence Matrix</h2>
      <div id="confidence"><div class="empty">Loading...</div></div>
    </div>
    <div class="card">
      <h2>Recent Events</h2>
      <div id="events"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <div class="grid">
    <div class="card full-width">
      <h2>Telemetry (24h)</h2>
      <div id="telemetry"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <div class="grid">
    <div class="card full-width">
      <h2>Replay Governance</h2>
      <div id="replay-governance"><div class="empty">Loading...</div></div>
    </div>
  </div>
</div>

<script>
const API = ''

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

function badge(status) {
  const map = { success: 'green', failure: 'red', dispatched: 'blue', running: 'yellow', idle: 'yellow', starting: 'blue', dead: 'red', promote: 'green', hold: 'yellow', reject: 'red' }
  return `<span class="badge badge-${map[status] || 'blue'}">${esc(status)}</span>`
}

function confBar(score) {
  const pct = Math.round(score * 100)
  const color = score >= 0.8 ? 'var(--green)' : score >= 0.6 ? 'var(--yellow)' : score >= 0.3 ? 'var(--accent)' : 'var(--red)'
  return `<span class="confidence-bar"><span class="confidence-fill" style="width:${pct}%;background:${color}"></span></span>${pct}%`
}

function timeAgo(ts) {
  if (!ts) return ''
  const d = new Date(ts)
  const s = Math.floor((Date.now() - d.getTime()) / 1000)
  if (s < 60) return `${s}s ago`
  if (s < 3600) return `${Math.floor(s/60)}m ago`
  if (s < 86400) return `${Math.floor(s/3600)}h ago`
  return `${Math.floor(s/86400)}d ago`
}

function fmtPct(value) {
  return value == null ? 'n/a' : `${(value * 100).toFixed(1)}%`
}

function fmtSourceMix(sources) {
  if (!sources || sources.length === 0) return 'none'
  return sources.map(src => `${esc(src.key)} (${src.count})`).join(', ')
}

async function fetchJSON(path) {
  try { const r = await fetch(API + path); return r.ok ? await r.json() : null }
  catch { return null }
}

async function loadStats() {
  const s = await fetchJSON('/api/stats')
  if (!s) return
  const blocked = s.cost?.budgetBlocked ? ' 🔴' : ''
  const activePolicy = s.policy?.active?.policyName || 'env-default'
  document.getElementById('stats').innerHTML = `
    <div class="stat-row"><span class="stat-label">Decisions</span><span class="stat-value">${s.decisions}</span></div>
    <div class="stat-row"><span class="stat-label">Success Rate</span><span class="stat-value">${s.successRate}%</span></div>
    <div class="stat-row"><span class="stat-label">Operator / Auto</span><span class="stat-value">${s.operatorDispatches} / ${s.autoDispatches}</span></div>
    <div class="stat-row"><span class="stat-label">Learnings</span><span class="stat-value">${s.learnings}</span></div>
    <div class="stat-row"><span class="stat-label">Cost (today)</span><span class="stat-value">$${(s.cost?.today ?? 0).toFixed(2)}${blocked}</span></div>
    <div class="stat-row"><span class="stat-label">Cost (total)</span><span class="stat-value">$${(s.cost?.total ?? 0).toFixed(2)}</span></div>
    <div class="stat-row"><span class="stat-label">Telemetry Runs (24h)</span><span class="stat-value">${s.cost?.runs24h ?? 0}</span></div>
    <div class="stat-row"><span class="stat-label">Tokens (24h)</span><span class="stat-value">${(s.cost?.tokens24h ?? 0).toLocaleString()}</span></div>
    <div class="stat-row"><span class="stat-label">Telemetry Coverage</span><span class="stat-value">${Math.round((s.cost?.coverage?.coverageRate ?? 0) * 100)}%</span></div>
    <div class="stat-row"><span class="stat-label">Active Policy</span><span class="stat-value">${esc(activePolicy)}</span></div>
    <div class="stat-row"><span class="stat-label">Operator Sessions</span><span class="stat-value">${s.operatorSessions}</span></div>
  `
}

async function loadTelemetry() {
  const t = await fetchJSON('/api/telemetry/summary?hours=24')
  if (!t) return
  const topHarnesses = t.byHarness?.slice(0, 6) ?? []
  const topModels = t.byModel?.slice(0, 6) ?? []
  const topSources = t.sources?.slice(0, 6) ?? []
  const harnessHealth = t.harnessHealth?.slice(0, 6) ?? []
  const latestImport = t.latestImport
  const recentImports = t.recentImports?.slice(0, 5) ?? []
  document.getElementById('telemetry').innerHTML = `
    <div class="stat-row"><span class="stat-label">24h Cost / Budget</span><span class="stat-value">$${(t.budget?.todayCostUsd ?? 0).toFixed(2)} / $${(t.budget?.dailyUsd ?? 0).toFixed(2)}</span></div>
    <div class="stat-row"><span class="stat-label">24h Runs</span><span class="stat-value">${t.runs ?? 0}</span></div>
    <div class="stat-row"><span class="stat-label">24h Tokens</span><span class="stat-value">${(t.totalTokens ?? 0).toLocaleString()}</span></div>
    <div class="stat-row"><span class="stat-label">Completed Decisions Covered</span><span class="stat-value">${t.coverage?.decisionsWithTelemetry ?? 0} / ${t.coverage?.completedDecisions ?? 0}</span></div>
    <div class="stat-row"><span class="stat-label">Orphan Telemetry Runs</span><span class="stat-value">${t.coverage?.orphanTelemetryRuns ?? 0}</span></div>
    <div class="stat-row"><span class="stat-label">Latest Import</span><span class="stat-value">${latestImport ? `${badge(latestImport.status)} ${timeAgo(latestImport.finishedAt || latestImport.startedAt)}` : 'none'}</span></div>
    <div class="stat-row"><span class="stat-label">Latest Import Result</span><span class="stat-value">${latestImport ? `${latestImport.imported}/${latestImport.scanned} imported` : 'n/a'}</span></div>
    <br>
    <table>
      <tr><th>Harness</th><th>Runs</th><th>Cost</th><th>Tokens</th></tr>
      ${topHarnesses.map(h => `<tr><td>${esc(h.key)}</td><td>${h.runs}</td><td>$${Number(h.costUsd || 0).toFixed(2)}</td><td>${Number(h.totalTokens || 0).toLocaleString()}</td></tr>`).join('')}
    </table>
    <br>
    <table>
      <tr><th>Source</th><th>Runs</th><th>Cost</th><th>Last Seen</th></tr>
      ${topSources.map(src => `<tr><td>${esc(src.key)}</td><td>${src.runs}</td><td>$${Number(src.costUsd || 0).toFixed(2)}</td><td>${src.lastSeenAt ? esc(timeAgo(src.lastSeenAt)) : 'n/a'}</td></tr>`).join('') || '<tr><td colspan="4" class="empty">No telemetry sources</td></tr>'}
    </table>
    <br>
    <table>
      <tr><th>Model</th><th>Runs</th><th>Cost</th></tr>
      ${topModels.map(m => `<tr><td>${esc(m.key)}</td><td>${m.runs}</td><td>$${Number(m.costUsd || 0).toFixed(2)}</td></tr>`).join('')}
    </table>
    <br>
    <table>
      <tr><th>Harness</th><th>Runs</th><th>Last Seen</th><th>Sources</th></tr>
      ${harnessHealth.map(h => `<tr><td>${esc(h.harness)}</td><td>${h.runs}</td><td>${h.lastSeenAt ? esc(timeAgo(h.lastSeenAt)) : 'n/a'}</td><td>${fmtSourceMix(h.sources)}</td></tr>`).join('') || '<tr><td colspan="4" class="empty">No harness telemetry</td></tr>'}
    </table>
    <br>
    <table>
      <tr><th>Import Status</th><th>When</th><th>Imported</th><th>Skipped</th></tr>
      ${recentImports.map(run => `<tr><td>${badge(run.status)}</td><td>${esc(timeAgo(run.finishedAt || run.startedAt))}</td><td>${run.imported}/${run.scanned}</td><td>${run.skipped}</td></tr>`).join('') || '<tr><td colspan="4" class="empty">No import runs yet</td></tr>'}
    </table>
  `
}

async function loadReplayGovernance() {
  const r = await fetchJSON('/api/replay/latest')
  if (!r?.latest) {
    document.getElementById('replay-governance').innerHTML = '<div class="empty">No replay evaluations recorded yet</div>'
    return
  }

  const active = r.activePolicy?.policyName || 'env-default'
  const latest = r.latest
  const promotion = latest.promotion?.status || latest.promotionStatus || 'unknown'
  const delta = latest.comparison?.delta || {}
  const evidence = latest.summary?.objectiveVector?.diagnostics || {}

  document.getElementById('replay-governance').innerHTML = `
    <div class="stat-row"><span class="stat-label">Active Dispatch Policy</span><span class="stat-value">${esc(active)}</span></div>
    <div class="stat-row"><span class="stat-label">Latest Candidate / Baseline</span><span class="stat-value">${esc(latest.candidatePolicyName)} / ${esc(latest.baselinePolicyName || 'none')}</span></div>
    <div class="stat-row"><span class="stat-label">Promotion Decision</span><span class="stat-value">${badge(promotion)}</span></div>
    <div class="stat-row"><span class="stat-label">Replay Scope</span><span class="stat-value">${esc(latest.scopeProject || 'all-projects')} · ${esc(latest.scopeSkill || 'all-skills')}</span></div>
    <div class="stat-row"><span class="stat-label">Examples</span><span class="stat-value">${latest.examples}</span></div>
    <div class="stat-row"><span class="stat-label">Safe Good Delta</span><span class="stat-value">${delta.safeGoodContinuationRate == null ? 'n/a' : (delta.safeGoodContinuationRate * 100).toFixed(1) + '%'}</span></div>
    <div class="stat-row"><span class="stat-label">Bad Divergence Delta</span><span class="stat-value">${delta.divergedFromBadDecisionRate == null ? 'n/a' : (delta.divergedFromBadDecisionRate * 100).toFixed(1) + '%'}</span></div>
    <div class="stat-row"><span class="stat-label">Predicted Cost Delta</span><span class="stat-value">${delta.avgPredictedCostUsd == null ? 'n/a' : '$' + Number(delta.avgPredictedCostUsd).toFixed(2)}</span></div>
    <div class="stat-row"><span class="stat-label">Telemetry Evidence Samples</span><span class="stat-value">${evidence.predictedCostEvidenceSamples ?? 0}</span></div>
    <table>
      <tr><th>Cost Evidence Source</th><th>Count</th></tr>
      ${((evidence.predictedCostSources || []).slice(0, 5)).map(src => `<tr><td>${esc(src.key)}</td><td>${src.count}</td></tr>`).join('') || '<tr><td colspan="2" class="empty">No cost evidence</td></tr>'}
    </table>
  `
}

async function loadStatus() {
  const s = await fetchJSON('/api/status')
  if (!s) return

  // Goals
  if (s.goals?.length > 0) {
    document.getElementById('goals').innerHTML = s.goals.map(g =>
      `<div class="stat-row"><span>${esc(g.intent.slice(0, 80))}</span><span>${badge(g.status)}</span></div>`
    ).join('')
  } else {
    document.getElementById('goals').innerHTML = '<div class="empty">No active goals</div>'
  }

  // Sessions
  if (s.sessions?.length > 0) {
    document.getElementById('sessions').innerHTML = `<table>
      <tr><th>Name</th><th>Status</th><th>Output</th></tr>
      ${s.sessions.map(sess => `<tr>
        <td>${esc(sess.name)}</td>
        <td>${badge(sess.alive ? (sess.idle ? 'idle' : sess.status) : 'dead')}</td>
        <td class="session-output">${esc(sess.lastOutput || '')}</td>
      </tr>`).join('')}
    </table>`
  } else {
    document.getElementById('sessions').innerHTML = '<div class="empty">No active sessions</div>'
  }

  // Decisions
  if (s.recentDecisions?.length > 0) {
    document.getElementById('decisions').innerHTML = `<table>
      <tr><th>Skill</th><th>Task</th><th>Status</th><th>Outcome</th><th>When</th></tr>
      ${s.recentDecisions.slice(0, 15).map(d => `<tr>
        <td><span class="badge badge-blue">${esc(d.skill || 'direct')}</span></td>
        <td>${esc((d.task || '').slice(0, 80))}</td>
        <td>${badge(d.status)}</td>
        <td class="session-output">${esc((d.outcome || '').slice(0, 60))}</td>
        <td style="color:var(--muted);white-space:nowrap">${timeAgo(d.created_at)}</td>
      </tr>`).join('')}
    </table>`
  } else {
    document.getElementById('decisions').innerHTML = '<div class="empty">No decisions yet</div>'
  }

  // Events
  if (s.events?.length > 0) {
    document.getElementById('events').innerHTML = s.events.map(e =>
      `<div class="stat-row"><span style="color:var(--muted)">${timeAgo(e.created_at)}</span><span>${esc(e.type)}${e.session_name ? ' — ' + esc(e.session_name) : ''}</span></div>`
    ).join('')
  } else {
    document.getElementById('events').innerHTML = '<div class="empty">No events</div>'
  }
}

async function loadConfidence() {
  const entries = await fetchJSON('/api/confidence')
  if (!entries || entries.length === 0) {
    document.getElementById('confidence').innerHTML = '<div class="empty">No confidence data</div>'
    return
  }
  document.getElementById('confidence').innerHTML = `<table>
    <tr><th>Skill</th><th>Project</th><th>Level</th><th>Score</th></tr>
    ${entries.slice(0, 15).map(e => `<tr>
      <td>${esc(e.skill)}</td>
      <td>${esc(e.project)}</td>
      <td>${badge(e.level)}</td>
      <td>${confBar(e.confidence)}</td>
    </tr>`).join('')}
  </table>`
}

async function loadHealth() {
  const h = await fetchJSON('/api/health')
  if (h) {
    const m = Math.floor(h.uptime / 60)
    const hrs = Math.floor(m / 60)
    document.getElementById('uptime').textContent = hrs > 0 ? `Up ${hrs}h ${m % 60}m` : `Up ${m}m`
  }
}

async function refresh() {
  await Promise.all([loadStats(), loadStatus(), loadConfidence(), loadHealth(), loadTelemetry(), loadReplayGovernance()])
}

// SSE for live updates
function connectSSE() {
  const es = new EventSource('/api/events')
  es.onmessage = () => { refresh() }
  es.onerror = () => { setTimeout(connectSSE, 5000) }
}

refresh()
setInterval(refresh, 15000)
connectSSE()
</script>
</body>
</html>
